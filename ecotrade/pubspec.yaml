name: ecotrade
description: EcoTrade - Waste Management Marketplace

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Navigation
  go_router: ^14.0.0

  # Firebase / Auth
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

  # Data Modeling
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Theming
  flex_color_scheme: ^8.0.0

  # Utilities
  equatable: ^2.0.7
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.6
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true